server:
  port: 8761

spring:
  application:
    name: eurekaserver
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always